<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - PhimFlix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

    <a href="index.html" style="position: absolute; top: 20px; left: 20px; color: #cbd5e1; text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: 500; font-size: 0.95rem; transition: color 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#cbd5e1'">
        <i class='bx bx-arrow-back'></i> Về trang chủ
    </a>

    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="logo">Phim<span style="color: var(--accent-primary);">Flix</span></div>
            <p>Đăng nhập hoặc đăng ký để tiếp tục</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-box active">
            <form class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <i class='bx bx-user'></i>
                    <input type="text" id="loginUsername" class="auth-input" placeholder="Tên đăng nhập" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-lock'></i>
                    <input type="password" id="loginPassword" class="auth-input" placeholder="Mật khẩu" required>
                </div>
                <div id="loginError" class="error-msg"></div>
                <div class="auth-options">
                    <label class="checkbox-group">
                        <input type="checkbox">
                        <span>Nhớ tôi</span>
                    </label>
                    <a href="#">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="auth-btn">Đăng Nhập</button>
                <div class="auth-switch">
                    Chưa có tài khoản?
                    <a href="#" onclick="toggleForm('registerForm')">Đăng ký ngay</a>
                </div>
            </form>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form-box">
            <form class="auth-form" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <i class='bx bx-user'></i>
                    <input type="text" id="regUsername" class="auth-input" placeholder="Tên đăng nhập" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="regEmail" class="auth-input" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-lock'></i>
                    <input type="password" id="regPassword" class="auth-input" placeholder="Mật khẩu" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="regConfirmPassword" class="auth-input" placeholder="Xác nhận mật khẩu" required>
                </div>
                <div id="registerError" class="error-msg"></div>
                <button type="submit" class="auth-btn">Đăng Ký</button>
                <div class="auth-switch">
                    Đã có tài khoản?
                    <a href="#" onclick="toggleForm('loginForm')">Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (Compat Version for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/config.js?v=4"></script>
    <script src="js/data.js?v=4"></script>
    <script src="js/auth.js"></script>
</body>
</html>
